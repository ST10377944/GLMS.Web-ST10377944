version: '3.8'

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-database
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Password123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong!Password123" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10

  glms-backend-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: glms-api
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=ContractManagementDb;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;
      - Jwt__Key=YourSuperSecretKeyThatIsAtLeast32CharactersLong!
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile.mvc
    container_name: glms-web
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiBaseUrl=http://glms-backend-api
    depends_on:
      - glms-backend-api
    networks:
      - glms-network

networks:
  glms-network:
    driver: bridge

volumes:
  sql_data: